version: 2

workflows:
  version: 2
  build:
    jobs:
      - lint_phpcs
      - lint_elm
      - lint_shellcheck
      - test_simpletest_linux:
          requires:
            - lint_phpcs
            - lint_elm
            - lint_shellcheck
      - e2e_playwright:
          requires:
            - lint_phpcs
            - lint_elm
            - lint_shellcheck

jobs:
  lint_phpcs:
    docker:
      - image: cimg/php:7.4.30
    steps:
      - checkout
      - run: ci-scripts/install_coder.sh
      - run: export REVIEW_STANDARD="Drupal" && ci-scripts/test_coder.sh
      - run: export REVIEW_STANDARD="DrupalPractice" && ci-scripts/test_coder.sh
  lint_elm:
    docker:
      - image: cimg/node:8.17.0
    steps:
      - checkout
      - run: ci-scripts/install_elm_format.sh
      - run: ci-scripts/test_elm_format.sh
  lint_shellcheck:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - run: ci-scripts/install_shell.sh
      - run: ci-scripts/test_shell.sh
  test_simpletest_linux:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - run: ci-scripts/install_ddev.sh
      - run: ci-scripts/install_drupal.sh
      - run: ci-scripts/circleci_wait.sh ddev simpletest
  e2e_playwright:
    machine:
      image: ubuntu-2204:current
    resource_class: large
    steps:
      - checkout
      - run:
          name: Free port 3000 for host-side serving
          command: rm -f .ddev/docker-compose.client-http.yaml
      - run:
          name: Install DDEV
          command: ci-scripts/install_ddev.sh
      - run:
          name: Install Drupal
          command: ci-scripts/install_drupal.sh
      - run:
          name: Install client dependencies
          command: |
            ddev exec "npm install -g elm@latest-0.19.1 elm-test@0.19.1-revision6 gulp-cli bower"
            ddev exec 'export PATH=$(npm prefix -g)/bin:$PATH && cd /var/www/html/client && bower install && npm install'
      - run:
          name: Build client
          command: |
            ddev exec "cp /var/www/html/client/src/elm/LocalConfig.Example.elm /var/www/html/client/src/elm/LocalConfig.elm"
            ddev exec "sed -i 's/module LocalConfig.Example/module LocalConfig/' /var/www/html/client/src/elm/LocalConfig.elm"
            ddev exec 'export PATH=$(npm prefix -g)/bin:$PATH && cd /var/www/html/client && gulp build'
      - run:
          name: Install Playwright browsers
          command: cd client && DEBIAN_FRONTEND=noninteractive npx playwright install --with-deps chromium
      - run:
          name: Start app
          command: cd client/serve && python3 -m http.server 3000
          background: true
      - run:
          name: Wait for app
          command: |
            for i in $(seq 1 60); do
              curl -s http://localhost:3000 > /dev/null && break
              sleep 2
            done
      - run:
          name: Run E2E tests
          command: cd client && npx playwright test
      - store_artifacts:
          path: client/test-results
          destination: playwright-results
