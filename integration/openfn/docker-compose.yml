# Local OpenFN Lightning for the E-Heza -> OpenFN -> OpenMRS patient PoC.
#
# Lightning runs locally (not the OpenFN cloud) so it can reach the local
# OpenMRS. Secrets live in .env (gitignored) - generated by the setup; see
# the integration README. Uses the published images (no build from source).
#
#   docker compose up -d
#   docker compose logs -f web
#   docker compose down            # stop (keeps the DB volume)
#
# UI: http://localhost:4001

name: openfn-poc

services:
  postgres:
    image: postgres:15.12-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: lightning
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - postgres:/var/lib/postgresql/data

  web:
    image: openfn/lightning:v2.16.4
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/lightning
      DISABLE_DB_SSL: "true"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      PRIMARY_ENCRYPTION_KEY: ${PRIMARY_ENCRYPTION_KEY}
      WORKER_RUNS_PRIVATE_KEY: ${WORKER_RUNS_PRIVATE_KEY}
      WORKER_LIGHTNING_PUBLIC_KEY: ${WORKER_LIGHTNING_PUBLIC_KEY}
      WORKER_SECRET: ${WORKER_SECRET}
      PORT: "4000"
      LISTEN_ADDRESS: 0.0.0.0
      URL_HOST: localhost
      URL_PORT: "4001"
      URL_SCHEME: http
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health_check"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s
    ports:
      - "4001:4000"

  worker:
    image: openfn/ws-worker:latest
    restart: unless-stopped
    depends_on:
      - web
    environment:
      WORKER_SECRET: ${WORKER_SECRET}
    command: ["pnpm", "start:prod", "-l", "ws://web:4000/worker"]

volumes:
  postgres: {}
